<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Es6</title>
  </head>
  <body>
    f12打开devtool
  </body>
  <script>
    // 箭头函数
    /**
     * ES6允许使用箭头 => 来定义函数
     */
    let func = (num) => num + 1;
    /**
     * 相当于
     * let func = function(num) {  return num + 1}
     */
    console.log(func(1));
    let a = () => 5;
    // 相当于
    let b = function () {
      return 5;
    };
    let c = (num1, num2) => num1 + num2;
    // 相当于
    let d = function (num1, num2) {
      return num1 + num2;
    };
    let sum = (num1, num2) => {
      let num = num1 + num2;
      return num;
    };
    // 箭头函数也可以直接返回一个对象，但是因为大括号会被当成代码块来执行，所以外面要加上小括号
    let func1 = (name) => ({ name });
    console.log(func1("Frank"));
    // 箭头函数最常用的应用场景是简化回调函数
    let arr = [1, 2, 3, 4, 5];
    let result = arr.map((item) => item * 2);
    // 箭头函数的特性
    /**
     * 1. 箭头函数没有自己的 this，而是引用外层的 this
     * 2. 箭头函数不能当作构造函数，不可以使用 new 命令
     * 3. 箭头函数没有 arguments
     */
    class Test {
      constructor() {
        this.num = 10;
      }
      calcOne(arr) {
        // 这里的this指向的是calcOne所在的对象
        return arr.map((item) => item * this.num);
      }
      calcTwo(arr) {
        let _this = this;
        return arr.map(function (item) {
          // function的this发生变化，不能直接引用到外部的this
          return item * _this.num;
        });
        /*
         * 相当于
         * return arr.map(function (item) {
         *  return item * this.num;
         * }, this);
         */
      }
    }
    let test = new Test();
    let arr1 = [1, 2, 3];
    console.log(test.calcOne(arr1));
    console.log(test.calcTwo(arr1));
    // 解构赋值
    // 解构赋值语法是一种 JavaScript 表达式，通过解构赋值，可以将属性、值从对象、数组中取出，赋值给其他变量
    // 以前如果我们想要给变量赋值，只能直接指定变量的值
    let aa = 1;
    let bb = 2;
    let cc = 3;
    // 如果我们想要从数组中取出值，需要这么来写
    let array = [1, 2, 3];
    let aaa = array[0];
    let bbb = array[1];
    let ccc = array[2];
    // 如果我们想要从对象中取出属性和值，需要这么来写
    let object = { a: 1, b: 2, c: 3 };
    let aaaa = object.a;
    let bbbb = object.b;
    let cccc = object.c;

    // 解构数组
    // 左侧的变量名和右侧数组中的元素一一对应
    let [a1, b1, c1] = [1, 2, 3];
    console.log(a1); // 1
    console.log(b1); // 2
    console.log(c1); // 3
    // 左边数组中可以设置默认值
    let [a2 = 1, b2 = 2] = [5];
    console.log(a2); // 5
    console.log(b2); // 2
    // 可以通过解构直接交换两个变量，在没有解构的时候，我们需要一个中间临时变量
    let a3 = 1;
    let b3 = 2;
    // 不使用解构来交换
    let c3 = a3;
    a3 = b3;
    b3 = c3;
    // 使用解构来交换
    [a3, b3] = [b3, a3];
    console.log(a3); // 2
    console.log(b3); // 1
    // 解构数组一个常用的场景是解析函数返回值
    function foo() {
      return [1, 2];
    }
    let [x, y] = foo();
    console.log(x); // 1
    console.log(y); // 2
    // 解构时可以忽略掉某些值
    let [m, , , n] = [1, 2, 3, 4];
    console.log(m); // 1
    console.log(n); // 4
    // 剩余模式，将剩余部分的数组赋值给一个变量
    let [mm, ...rest] = [1, 2, 3];
    console.log(mm); // 1
    console.log(rest); // [2, 3]

    // 解构对象
    // let object = { a: 1, b: 2, c: 3 };
    // let { a, b } = object;
    // console.log(a); // 1
    // console.log(b); // 2
    // 可以从一个对象中提取变量并赋值给和属性名不同的新变量名
    // let object = { a: 1, b: 2, c: 3 };
    // let { a: aa, b: bb } = object;
    // console.log(aa); // 1
    // console.log(bb); // 2
    // 解构对象也可以指定默认值
    // let object = { a: 5 };
    // let { a = 1, b = 2 } = object;
    // console.log(a); // 5
    // console.log(b); // 2
    // 解构对象也支持剩余模式
    // let { a, ...b } = { a: 1, b: 2, c: 3 };
    // console.log(a); // 1
    // console.log(b); // { b: 2, c: 3 }
    // 解构对象的一个典型应用场景是从函数参数对象中提取数据，例如下面的代码，函数接收的参数是一个对象
    // 如果不使用解构，需要专门去读取参数对象中的属性值
    // function test(user) {
    //   console.log(user.id, user.name);
    // }
    // let user = {
    //   id: 1,
    //   name: "test",
    // };
    // test(user);
    // 如果我们使用解构对象，接可以直接将属性取出来
    // function test({ id, name }) {
    //   console.log(id, name);
    // }
    // let user = {
    //   id: 1,
    //   name: "test",
    // };
    // test(user);

    // 模板字符串
    // 模板字符串是增强版的字符串，用反引号 (`)来标识
    // 它可当作普通字符串来使用，也可以用来定义多行文本
    // 或者通过 `${}` 在字符串中嵌入变量或表达式。
    // let a = `template string`; // 普通字符串
    // let name = "Frank";
    // let b = `Hello ${name}!`;
    // console.log(b);
    // 模板字符串的另外一大作用就是多行文本定义变得更加方便
    let name = "Frank";
    let str = `<div>
  <p>Hello ${name}!</p>
</div>`;
    let str1 = "<div>\n  <p>Hello " + name + "!</p>\n</div>";
    console.log(str1 === str);

    // 三元表达式
    if (a === 1) {
      console.log("a=1");
    } else if (a === 2) {
      console.log("a=2");
    } else {
      console.log("a=other");
    }

    a === 1
      ? console.log("a=1")
      : a === 2
      ? console.log("a=2")
      : console.log("a=other");
  </script>
</html>
