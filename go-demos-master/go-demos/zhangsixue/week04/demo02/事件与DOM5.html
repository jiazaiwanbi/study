<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="div_box"></div>
    <button onclick="genDivs()">产生3个div</button>

    <button>删除所有div</button>

    <script>
      let index = 0;
      let divBox = document.querySelector("#div_box");
      function genDivs() {
        index = divBox.children.length + 1;
        console.log("count", index);
        for (let i = 0; i < 3; i++) {
          let pDom = document.createElement("p");

          pDom.innerText = `这是项目${index + i}`;
          divBox.appendChild(pDom);
        }
      }
    </script>
  </body>
</html>
