<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>计算器</title>
    <script>
      function stopLink(e) {
        e.preventDefault();
      }
    </script>
  </head>
  <body>
    <div>
      <a onclick="stopLink(event)" href="http://www.wps.cn">点击链接无效</a>
    </div>
    <div><input type="text" placeholder="不能输入任何文本" /></div>
    <script>
      const input = document.querySelector("input");
      input.addEventListener("keydown", updateValue);

      function updateValue(e) {
        e.preventDefault();
      }
    </script>
  </body>
</html>
